<!DOCTYPE html>
<html lang="en">
    <head>

        <style>

            margin: 0;

            -webkit-appearance: none;

            display: flex;

            .brush-card:hover, .obs-card:hover {
            border-color: #555;

            }
            .brush-card:active, .obs-card:active, .clear-btn:active {

            }
            .brush-card.selected {
            border-color: #b04040;

            .brush-card.active, .obs-card.active {
            border-color: #b04040;

            box-shadow: 0 0 12px rgba(176,64,64,0.15);

            .brush-prev, .obs-prev {
            width: 36px;

            .brush-name, .obs-name {
            font-size: 10.5px;
            color: #aaa;

            max-width: 72px;

            }
            .brush-key, .obs-key, .clear-key {
            position: absolute;
            top: 4px;

            #block-edit {

            .ed-dir-container {

            .ed-dir-btn {
            width: 42px;
            height: 42px;
            border: 2px solid #333;
            border-radius: 6px;

            color: #c8c8c8;

            }
            .ed-dir-btn.active {
            border-color: #b04040;

            .ed-close {

            .ed-close:hover {
            color: #b04040;
            }
            .ed-slider {
            width: 110px;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: #2a1a1a;

            }
            .ed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #b04040;
            cursor: pointer;
            border: 2px solid #1a1a1a;

            #coords {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 11px;
            color: #444;
            z-index: 5;
            pointer-events: none;
            font-variant-numeric: tabular-nums;

            #zoom-info {
            position: absolute;

            #pan-hint {

            transform: translateX(-50%);

            #help-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(13,13,13,0.92);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            }
            ::-webkit-scrollbar {

            background: transparent;
            }
            ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 3px;
            }
        </style>
    </head>
    <body>
        <div id="app">
            <div id="top-panel">
                <div id="tick-counter">0</div>
                <div id="speed-wrap">
                    <label id="lbl-speed"></label>
                    <input type="range" id="speed-slider" min="1" max="100" value="12">
                    <span id="speed-val">12 tps</span>
                </div>
                <div id="top-right">
                    <button class="btn btn-run" id="btn-run"></button>
                    <button class="btn" id="lang-btn">RU</button>
                </div>
            </div>
            <div id="canvas-wrap">
                <canvas id="game-canvas"></canvas>
                <div id="block-edit">
                    <span class="ed-close" id="ed-close">×</span>
                    <h4 id="edit-title"></h4>
                    <div id="edit-body"></div>
                </div>
                <div id="coords"></div>
                <div id="zoom-info"></div>
                <div id="pan-hint"></div>
            </div>
            <div id="bottom-panel"></div>
        </div>
        <div id="help-modal">
            <div style="background:#161616;border:3px solid #b04040;border-radius:12px;width:90%;max-width:620px;max-height:90vh;overflow-y:auto;padding:30px 28px;position:relative;color:#ddd;box-shadow:0 0 40px rgba(176,64,64,.3);">
                <span id="help-close" style="position:absolute;top:14px;right:24px;font-size:32px;line-height:1;cursor:pointer;color:#888;">×</span>
                <h2 id="help-title" style="color:#b04040;margin:0 0 20px;font-size:24px;font-weight:700;"></h2>
                <div id="help-body" style="font-size:14px;line-height:1.6;"></div>
            </div>
        </div>
        <script>
            "use strict";
            const I18N = {
            ru: {
            speed: "Скорость:", start: "Старт", stop: "Стоп",
            empty: "Пустота", energy: "Энергоблок", button: "Кнопка", delayer: "Задержатель", clear: "Очистить",
            observer: "Наблюдатель", on: "Вкл", off: "Выкл", pressed: "Нажата", notPressed: "Не нажата",
            delay: "Задержка", ticks: "тик.", status: "Статус",
            editEnergy: "Энергоблок", editButton: "Кнопка", editDelayer: "Задержатель", editLamp: "Лампа",
            separator: "Разделитель", lamp: "Лампа",
            panHint: "ПКМ / Сред. кнопка — перемещение камеры",
            clearConfirm: "Очистить всё поле?"
                                          },
            en: {
            speed: "Speed:", start: "Start", stop: "Stop",
            empty: "Empty", energy: "Energy", button: "Button", delayer: "Delayer", clear: "Clear",
            observer: "Observer", on: "On", off: "Off", pressed: "Pressed", notPressed: "Released",
            delay: "Delay", ticks: "ticks", status: "Status",
            editEnergy: "Energy Block", editButton: "Button", editDelayer: "Delayer", editLamp: "Lamp",
            separator: "Separator", lamp: "Lamp",
            panHint: "RMB / Middle btn — pan camera",
            clearConfirm: "Clear entire field?"
                                          }
                                        };
            let lang = "en";
            const t = k => I18N[lang][k] || k;
            const GRID = 1000;
            const BCELL = 20;
            const ZMIN = 0.5;
            const ZMAX = 3;
            const ID_EMPTY = 0;
            const ID_ENERGY = 1;
            const ID_BUTTON = 2;
            const ID_DELAY = 3;
            const ID_SEPARATOR = 4;
            const ID_LAMP = 5;
            let wasm = null;
            let gamePtr = null;
            const gridId = new Uint8Array(GRID * GRID);
            const gridSt = new Uint8Array(GRID * GRID);
            const separatorDir = new Uint8Array(GRID * GRID);
            function gIdx(x, y) { return y * GRID + x; }
            function getCell(x, y) { const i = gIdx(x, y); return {id: gridId[i], status: gridSt[i]}; }
            function setCell(x, y, id, st) { const i = gIdx(x, y); gridId[i] = id; gridSt[i] = st; }
            let cam = { x: 500, y: 500, zoom: 1 };
            const BRUSHES = [
                                          {id: 0, st: 0, key: "empty", hotkey: "1"},
                                          {id: 1, st: 10, key: "energy", hotkey: "2"},
                                          {id: 2, st: 0, key: "button", hotkey: "3"},
                                          {id: 3, st: 1, key: "delayer", hotkey: "4"},
                                          {id: 4, st: 0, key: "separator", hotkey: "5"},
                                          {id: 5, st: 0, key: "lamp", hotkey: "6"}
                                        ];
            let selBrush = 1;
            let obsMode = false;
            let lastEnergyDir = 10;
            let running = false;
            let tickTimer = null;
            let tps = 12;
            let curTick = 0;
            let panning = false;
            let panBtn = -1;
            let panPrev = {x: 0, y: 0};
            let drawing = false;
            let drawStart = null;
            let drawMoved = false;
            let ctrlKey = false;
            let lineOrigin = null;
            let hoverGx = -1, hoverGy = -1;
            let selecting = false;
            let selStart = null;
            let selRect = null;
            let selectMoved = false;
            
            let touchStartTime = 0;
            let lastTwoTouches = null;
            let lastTouchDist = 0;
            let currentTouchesCount = 0;
            
            async function loadWasm() {
            try {
            const r = await fetch("game.wasm");
            if (!r.ok) throw new Error("HTTP " + r.status);
            const buf = await r.arrayBuffer();
            const {instance} = await WebAssembly.instantiate(buf, {env: {}});
            wasm = instance.exports;
            initWasmGame();
                                          } catch (e) {
            console.warn("[WASM] game.wasm not available — UI-only mode.", e.message);
                                          }
                                        }
            function initWasmGame() {
            if (!wasm) return;
            if (gamePtr) wasm.GameStop(gamePtr);
            gamePtr = wasm.GameInit();
            pushGridToWasm();
                                        }
            function pushGridToWasm() {
            if (!wasm || !gamePtr) return;
            for (let y = 0; y < GRID; y++) {
            for (let x = 0; x < GRID; x++) {
            const i = gIdx(x, y);
            if (gridId[i] !== 0) {
            wasm.GameUpdate(gamePtr, x, y, gridId[i], gridSt[i]);
                                              }
                                            }
                                          }
                                        }
            function wasmUpdate(x, y, id, st) {
            if (!wasm || !gamePtr) return;
            wasm.GameUpdate(gamePtr, x, y, id, st);
                                        }
            function wasmTick() {
            if (!wasm || !gamePtr) return;
            try {
            const ptr = wasm.GameTick(gamePtr);
            const len = wasm.getArrayLen();
            const bsz = wasm.getNewTickBlockSize();
            curTick = wasm.getNumTick();
            if (len > 0 && ptr) {
            const dv = new DataView(wasm.memory.buffer, ptr, len * bsz);
            for (let i = 0; i < len; i++) {
            const o = i * bsz;
            const cx = dv.getUint32(o, true);
            const cy = dv.getUint32(o + 4, true);
            const ns = dv.getUint8(o + 8);
            if (cx >= 0 && cx < GRID && cy >= 0 && cy < GRID) {
            gridSt[gIdx(cx, cy)] = ns;
                                                }
                                              }
            wasm.freeArray();
                                            }
                                          } catch (err) {
            console.error("[WASM] Error in GameTick:", err);
                                          }
            document.getElementById("tick-counter").textContent = curTick.toLocaleString("ru-RU");
            render();
                                        }
            function wasmStop() {
            if (!wasm || !gamePtr) return;
            wasm.GameStop(gamePtr);
            gamePtr = null;
                                        }
            function getAutoDir(gx, gy) {
            const neighbors = [
                                            {dx: -1, dy: 0, dir: 40},
                                            {dx: 1, dy: 0, dir: 20},
                                            {dx: 0, dy: -1, dir: 30},
                                            {dx: 0, dy: 1, dir: 10}
                                          ];
            for (let n of neighbors) {
            const nx = gx + n.dx;
            const ny = gy + n.dy;
            if (nx >= 0 && nx < GRID && ny >= 0 && ny < GRID && getCell(nx, ny).id !== ID_EMPTY) {
            return n.dir;
                                            }
                                          }
            return 10;
                                        }
            function getRemainingTime(gx, gy) {
            if (!wasm || !gamePtr) return gridSt[gIdx(gx, gy)] || 0;
            try {
            return wasm.getTimeDalye(gamePtr, gx, gy);
                                          } catch (e) {
            return gridSt[gIdx(gx, gy)] || 0;
                                          }
                                        }
            const cvs = document.getElementById("game-canvas");
            const ctx = cvs.getContext("2d");
            const wrap = document.getElementById("canvas-wrap");
            function resize() {
            cvs.width = wrap.clientWidth;
            cvs.height = wrap.clientHeight;
            render();
                                        }
            window.addEventListener("resize", resize);
            function cellPx() { return BCELL * cam.zoom; }
            function camOffset() {
            const cs = cellPx();
            return { x: cam.x * cs - cvs.width / 2, y: cam.y * cs - cvs.height / 2 };
                                        }
            function visibleRange() {
            const cs = cellPx();
            const o = camOffset();
            return {
            x0: Math.max(0, Math.floor(o.x / cs)),
            y0: Math.max(0, Math.floor(o.y / cs)),
            x1: Math.min(GRID, Math.ceil((o.x + cvs.width) / cs)),
            y1: Math.min(GRID, Math.ceil((o.y + cvs.height) / cs))
                                          };
                                        }
            function render() {
            const W = cvs.width;
            const H = cvs.height;
            if (!W || !H) return;
            const cs = cellPx();
            const o = camOffset();
            const v = visibleRange();
            ctx.fillStyle = "#080808";
            ctx.fillRect(0, 0, W, H);
            const pad = Math.max(0.5, cs * 0.07);
            const inner = cs - pad * 2;
            for (let gy = v.y0; gy < v.y1; gy++) {
            for (let gx = v.x0; gx < v.x1; gx++) {
            const px = gx * cs - o.x;
            const py = gy * cs - o.y;
            const i = gIdx(gx, gy);
            renderCell(px, py, cs, pad, inner, gx, gy, gridId[i], gridSt[i]);
                                            }
                                          }
            if (cs >= 8) {
            ctx.strokeStyle = cs >= 16 ? "rgba(55,55,55,0.85)" : "rgba(40,40,40,0.6)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            const x0scr = v.x0 * cs - o.x;
            const x1scr = v.x1 * cs - o.x;
            const y0scr = v.y0 * cs - o.y;
            const y1scr = v.y1 * cs - o.y;
            for (let gx = v.x0; gx <= v.x1; gx++) {
            const sx = Math.round(gx * cs - o.x) + 0.5;
            ctx.moveTo(sx, y0scr);
            ctx.lineTo(sx, y1scr);
                                            }
            for (let gy = v.y0; gy <= v.y1; gy++) {
            const sy = Math.round(gy * cs - o.y) + 0.5;
            ctx.moveTo(x0scr, sy);
            ctx.lineTo(x1scr, sy);
                                            }
            ctx.stroke();
                                          }
            if (hoverGx >= 0 && hoverGy >= 0) {
            const hpx = hoverGx * cs - o.x;
            const hpy = hoverGy * cs - o.y;
            ctx.save();
            ctx.strokeStyle = "rgba(176,64,64,0.6)";
            ctx.lineWidth = 2.5;
            ctx.strokeRect(hpx + 1, hpy + 1, cs - 2, cs - 2);
            ctx.restore();
                                          }
            if (ctrlKey && drawing && lineOrigin) {
            const sx = lineOrigin.x * cs - o.x + cs / 2;
            const sy = lineOrigin.y * cs - o.y + cs / 2;
            const ex = hoverGx * cs - o.x + cs / 2;
            const ey = hoverGy * cs - o.y + cs / 2;
            ctx.save();
            ctx.strokeStyle = "rgba(176,64,64,0.55)";
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 4]);
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(ex, ey);
            ctx.stroke();
            ctx.restore();
                                          }
            document.getElementById("zoom-info").textContent = `×${cam.zoom.toFixed(1)}`;
                                        }
            function renderCell(px, py, cs, pad, inner, gx, gy, id, st) {
            switch (id) {
            case ID_EMPTY:
            ctx.fillStyle = "#131313";
            ctx.fillRect(px + pad, py + pad, inner, inner);
            break;
            case ID_ENERGY: {
            const dirCode = Math.floor(st / 10) || 1;
            const isOn = (st % 10) === 1;
            if (isOn) {
            ctx.save();
            const gr = ctx.createRadialGradient(px + cs / 2, py + cs / 2, inner * 0.08, px + cs / 2, py + cs / 2, inner * 0.65);
            gr.addColorStop(0, "#ff5050");
            gr.addColorStop(0.5, "#d03030");
            gr.addColorStop(1, "#3a1010");
            ctx.fillStyle = gr;
            ctx.fillRect(px + pad, py + pad, inner, inner);
            ctx.shadowColor = "#ff4040";
            ctx.shadowBlur = cs * 0.5;
            ctx.fillStyle = "rgba(255,80,80,0.25)";
            ctx.fillRect(px + pad + 1, py + pad + 1, inner - 2, inner - 2);
            ctx.restore();
                                              } else {

            vspan.style.cssText = "font-size:12.5px;color:#b04040;min-width:26px;text-align:center;font-weight:600";
            vspan.textContent = initVal;
            sl.oninput = () => {
            vspan.textContent = sl.value;
            onChange(parseInt(sl.value));
                                          };
            row.append(lbl, sl, vspan);
            parent.appendChild(row);
                                        }
            function closeEdit() {
            editEl.classList.remove("show");
                                        }
            document.getElementById("ed-close").addEventListener("click", closeEdit);
            function validG(x, y) {
            return x >= 0 && x < GRID && y >= 0 && y < GRID;
                                        }
            document.addEventListener("keydown", e => {
            if (e.key === "Control") ctrlKey = true;
            if (e.key === 'F1') {
            e.preventDefault();
            showHelp();
            return;
                        }
            if (selBrush === 1 && hoverGx >= 0 && hoverGy >= 0) {
            const cell = getCell(hoverGx, hoverGy);
            if (cell.id === ID_ENERGY) {
            let newDir = null;
            const k = e.key.toLowerCase();
            if (k === 'w') newDir = 10;
            else if (k === 'a') newDir = 20;
            else if (k === 's') newDir = 30;
            else if (k === 'd') newDir = 40;
            if (newDir !== null) {
            const isOn = (cell.status % 10) === 1;
            const newSt = newDir + (isOn ? 1 : 0);
            setCell(hoverGx, hoverGy, ID_ENERGY, newSt);
            wasmUpdate(hoverGx, hoverGy, ID_ENERGY, newSt);
            lastEnergyDir = newDir;
            render();
            e.preventDefault();
            return;
                                            }
                                          }
                                        }
            if (e.key === "1") { selBrush = 0; buildBP(); }
            if (e.key === "2") { selBrush = 1; buildBP(); }
            if (e.key === "3") { selBrush = 2; buildBP(); }
            if (e.key === "4") { selBrush = 3; buildBP(); }
            if (e.key === "5") { selBrush = 4; buildBP(); }
            if (e.key === "6") { selBrush = 5; buildBP(); }
            if (e.key.toLowerCase() === "o") { obsMode = !obsMode; closeEdit(); buildBP(); }
            if (e.key.toLowerCase() === "c" || e.key === "Delete") { clearAll(); }
                                        });
            document.addEventListener("keyup", e => {
            if (e.key === "Control") ctrlKey = false;
                                        });
            let lastPlaced = null;
            function placeBlock(gx, gy) {
            if (!validG(gx, gy) || obsMode) return;
            if (lastPlaced && lastPlaced.x === gx && lastPlaced.y === gy) return;
            let b = {...BRUSHES[selBrush]};
            if (b.id === ID_ENERGY) b.st = lastEnergyDir;
            else if (b.id === ID_SEPARATOR) {
            const dir = getAutoDir(gx, gy);
            separatorDir[gIdx(gx, gy)] = dir;
            b.st = 0;
                                          }
            setCell(gx, gy, b.id, b.st);
            wasmUpdate(gx, gy, b.id, b.st);
            lastPlaced = {x: gx, y: gy};
            requestAnimationFrame(() => { lastPlaced = null; });
            render();
                                        }
            function bresenham(x0, y0, x1, y1) {
            const dx = Math.abs(x1 - x0);
            const dy = Math.abs(y1 - y0);
            const sx = x0 < x1 ? 1 : -1;
            const sy = y0 < y1 ? 1 : -1;
            let err = dx - dy;
            let cx = x0;
            let cy = y0;
            for (;;) {
            if (validG(cx, cy)) {
            let b = {...BRUSHES[selBrush]};
            if (b.id === ID_ENERGY) b.st = lastEnergyDir;
            else if (b.id === ID_SEPARATOR) {
            const dir = getAutoDir(cx, cy);
            separatorDir[gIdx(cx, cy)] = dir;
            b.st = 0;
                                              }
            setCell(cx, cy, b.id, b.st);
            wasmUpdate(cx, cy, b.id, b.st);
                                            }
            if (cx === x1 && cy === y1) break;
            const e2 = 2 * err;
            if (e2 > -dy) { err -= dy; cx += sx; }
            if (e2 < dx) { err += dx; cy += sy; }
                                          }
            render();
                                        }
            function clearAll() {
            if (!confirm(t("clearConfirm"))) return;
            gridId.fill(0);
            gridSt.fill(0);
            separatorDir.fill(0);
            selRect = null;
            if (wasm && gamePtr) {
            wasm.GameStop(gamePtr);
            gamePtr = wasm.GameInit();
                                          }
            render();
                                        }
            function stylePrev(el, b) {
            switch (b.id) {
            case 0:
            el.style.background = "#131313";
            break;
            case 1:
            case 4:
            case 5:
            el.style.background = "linear-gradient(135deg,#252525,#3a2020)";
            break;
            case 2:
            el.style.background = "#1c1c1c";
            el.style.borderTop = "3px solid #2a2a2a";
            el.style.borderLeft = "3px solid #2a2a2a";
            el.style.borderBottom = "3px solid #111";
            el.style.borderRight = "3px solid #111";
            break;
            case 3:
            el.style.cssText = "background:#10101a;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#b04040;border-radius:5px;border:1px solid #333;width:36px;height:36px";
            el.textContent = "1";
            break;
                                          }
                                        }
            function buildBP() {
            const bp = document.getElementById("bottom-panel");
            bp.innerHTML = "";
            BRUSHES.forEach((b, i) => {
            const card = document.createElement("div");
            card.className = "brush-card" + (selBrush === i ? " selected" : "");
            const prev = document.createElement("div");
            prev.className = "brush-prev";
            stylePrev(prev, b);
            const nm = document.createElement("div");
            nm.className = "brush-name";
            nm.textContent = t(b.key);
            const keyLabel = document.createElement("div");
            keyLabel.className = "brush-key";
            keyLabel.textContent = b.hotkey;
            card.append(prev, nm, keyLabel);
            card.onclick = () => {
            selBrush = i;
            buildBP();
                                            };
            bp.appendChild(card);
                                          });
            const sep1 = document.createElement("div");
            sep1.className = "sep";
            bp.appendChild(sep1);
            const clearCard = document.createElement("div");
            clearCard.className = "clear-btn";
            const cprev = document.createElement("div");
            cprev.className = "clear-prev";
            cprev.textContent = "⌫";
            const cname = document.createElement("div");
            cname.className = "brush-name";
            cname.textContent = t("clear");
            cname.style.color = "#e06666";
            const ckey = document.createElement("div");
            ckey.className = "clear-key";
            ckey.textContent = "C";
            clearCard.append(cprev, cname, ckey);
            clearCard.onclick = clearAll;
            bp.appendChild(clearCard);
            const sep2 = document.createElement("div");
            sep2.className = "sep";
            bp.appendChild(sep2);
            const obsCard = document.createElement("div");
            obsCard.className = "obs-card" + (obsMode ? " active" : "");
            const obsPrev = document.createElement("div");
            obsPrev.className = "obs-prev";
            obsPrev.innerHTML = `<svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 8C9.5 8 6 14 6 14C6 14 9.5 20 14 20C18.5 20 22 14 22 14C22 14 18.5 8 14 8Z" stroke="#b04040" stroke-width="2.5" stroke-linejoin="round"/><circle cx="14" cy="14" r="4" fill="#b04040"/></svg>`;
            const obsName = document.createElement("div");
            obsName.className = "obs-name";
            obsName.textContent = t("observer");
            const obsKey = document.createElement("div");
            obsKey.className = "obs-key";
            obsKey.textContent = "O";
            obsCard.append(obsPrev, obsName, obsKey);
            obsCard.onclick = () => {
            obsMode = !obsMode;
            closeEdit();
            buildBP();
                                          };
            bp.appendChild(obsCard);
                                        }
            const speedSlider = document.getElementById("speed-slider");
            const speedValEl = document.getElementById("speed-val");
            const btnRun = document.getElementById("btn-run");
            speedSlider.addEventListener("input", () => {
            tps = parseInt(speedSlider.value);
            speedValEl.textContent = tps + " tps";
            if (running) {
            clearInterval(tickTimer);
            tickTimer = setInterval(wasmTick, 1000 / tps);
                                          }
                                        });
            btnRun.addEventListener("click", () => {
            if (!running) startGame();
            else stopGame();
                                        });
            function startGame() {
            if (!gamePtr) initWasmGame();
            running = true;
            btnRun.textContent = t("stop");
            btnRun.classList.add("running");
            tickTimer = setInterval(wasmTick, 1000 / tps);
                                        }
            function stopGame() {
            running = false;
            clearInterval(tickTimer);
            tickTimer = null;
            btnRun.textContent = t("start");
            btnRun.classList.remove("running");
            wasmStop();
            initWasmGame();
                                        }
            document.getElementById("lang-btn").addEventListener("click", () => {
            lang = lang === "ru" ? "en" : "ru";
            document.getElementById("lang-btn").textContent = lang === "ru" ? "EN" : "RU";
            document.documentElement.lang = lang;
            applyLang();
                                        });
            function applyLang() {
            document.getElementById("lbl-speed").textContent = t("speed");
            btnRun.textContent = running ? t("stop") : t("start");
            document.getElementById("pan-hint").textContent = t("panHint");
            buildBP();
                                        }
            // Help modal
            const helpModal = document.getElementById('help-modal');
            const helpTitleEl = document.getElementById('help-title');
            const helpBodyEl = document.getElementById('help-body');
            const helpCloseEl = document.getElementById('help-close');
            function showHelp() {
            const isRu = lang === 'ru';
            helpTitleEl.textContent = isRu ? 'Подсказки игры и hotkeys' : 'Game Help & Hotkeys';
            helpBodyEl.innerHTML = `
                        <p><strong>${isRu ? 'Горячие клавиши:' : 'Hotkeys:'}</strong></p>
                        <ul style="margin:12px 0 20px 20px;padding:0;list-style:none;">
                        <li><code>1</code>–<code>6</code>: ${t('empty')}, ${t('energy')}, ${t('button')}, ${t('delayer')}, ${t('separator')}, ${t('lamp')}</li>
                        <li><code>O</code>: ${t('observer')}</li>
                        <li><code>C</code> / <code>Delete</code>: ${t('clear')}</li>
                        <li><code>Shift</code> + ЛКМ (drag): ${isRu ? 'Выделить область' : 'Select area'}</li>
                        <li><code>Shift</code> + ЛКМ (click): ${isRu ? 'Редактировать блок' : 'Edit block'}</li>
                        <li><code>Ctrl</code> + drag ЛКМ: ${isRu ? 'Линия блоков' : 'Draw line'}</li>
                        <li><code>F1</code>: ${isRu ? 'Эта помощь' : 'This help'}</li>
                        <li><code>WASD</code> (hover on energy): ${isRu ? 'Сменить направление' : 'Change direction'}</li>
                        </ul>
                        <p><strong>${isRu ? 'Сенсорные экраны:' : 'Touch support:'}</strong></p>
                        <ul style="margin:12px 0 20px 20px;padding:0;list-style:none;">
                        <li>${isRu ? 'Один палец — drag:' : 'One finger drag:'} ${isRu ? 'рисовать блоки' : 'draw blocks'}</li>
                        <li>${isRu ? 'Один палец — быстрый тап:' : 'One finger tap:'} ${isRu ? 'редактировать блок' : 'edit block'}</li>
                        <li>${isRu ? 'Два пальца:' : 'Two fingers:'} ${isRu ? 'панорамирование + pinch-to-zoom' : 'pan + pinch zoom'}</li>
                        </ul>
                          `;
            helpModal.style.display = 'flex';
                        }
            helpCloseEl.addEventListener('click', () => helpModal.style.display = 'none');
            helpModal.addEventListener('click', (e) => {
            if (e.target === helpModal) helpModal.style.display = 'none';
                        });
            document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && helpModal.style.display === 'flex') {
            helpModal.style.display = 'none';
            e.preventDefault();
                          }
                        });
                                        (function boot() {
            resize();
            applyLang();
            loadWasm();
            const h = document.getElementById("pan-hint");
            h.classList.add("show");
            setTimeout(() => h.classList.remove("show"), 4000);
            buildBP();
                                        })();
        </script>
    </body>
</html>
